<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EXTREME Disney">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <title>EXTREME Disney</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --deep-space: #020617; --panel-bg: rgba(15, 23, 42, 0.95); }
        body { background-color: var(--deep-space); background-image: radial-gradient(circle at 50% 0%, #0f172a 0%, var(--deep-space) 100%); color: #e0faff; font-family: 'Noto Sans JP', sans-serif; margin: 0; min-height: 100dvh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); overflow-y: auto; overflow-x: hidden; touch-action: manipulation; overscroll-behavior-y: contain; }
        .tomorrow-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.15); }
        .neon-border { border: 1px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15); }
        .text-shadow-cyan { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .rect-btn { min-height: 50px; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4px 6px; line-height: 1.2; font-weight: bold; gap: 2px; }
        .category-icon { width: 20px; height: 20px; margin-bottom: 2px; stroke: var(--neon-blue); fill: none; stroke-width: 1.5; }
        .cost-display-bar { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
        input, select, textarea { font-size: 16px !important; max-width: 100%; box-sizing: border-box; }
        button { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; transition: transform .12s ease, opacity .12s ease, background-color .15s ease; }
        button:active { transform: scale(0.96); }
        @keyframes pulse-slow { 0%, 100% { border-color: rgba(0,242,255,0.2); } 50% { border-color: rgba(0,242,255,1); } }
        .recording-active { animation: pulse-slow 2s infinite; border-width: 2px; }
        /* ---- Native-like bottom sheet ---- */
        #modal-overlay { opacity: 0; transition: opacity .25s ease; }
        #modal-overlay.modal-open { opacity: 1; }
        #modal-container { transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1); will-change: transform; }
        #modal-overlay.modal-open #modal-container { transform: translateY(0); }
        #confirm-overlay { opacity: 0; transition: opacity .22s ease; }
        #confirm-overlay.confirm-open { opacity: 1; }
        #confirm-card { transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1); }
        #confirm-overlay.confirm-open #confirm-card { transform: translateY(0); }
        /* ---- Toast ---- */
        #toast-root { position: fixed; top: calc(env(safe-area-inset-top) + 66px); left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 300; pointer-events: none; }
        .toast { background: rgba(8, 15, 35, 0.96); border: 1px solid rgba(0, 242, 255, 0.45); color: #e0faff; padding: 10px 20px; border-radius: 999px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 24px rgba(0, 242, 255, 0.18); animation: toast-in .25s ease; transition: opacity .35s ease, transform .35s ease; max-width: 85vw; }
        .toast-error { border-color: rgba(248, 113, 113, 0.55); color: #fecaca; box-shadow: 0 4px 24px rgba(248, 113, 113, 0.15); }
        @keyframes toast-in { from { opacity: 0; transform: translateY(-10px) scale(.95); } to { opacity: 1; transform: none; } }
        /* ---- Wait time badge ---- */
        .wait-badge { font-family: 'Orbitron', sans-serif; font-size: 9px; padding: 1px 7px; border-radius: 6px; margin-top: 2px; font-weight: bold; letter-spacing: .05em; }
        .wait-low { color: #4ade80; border: 1px solid rgba(74,222,128,.45); background: rgba(74,222,128,.08); }
        .wait-mid { color: #facc15; border: 1px solid rgba(250,204,21,.45); background: rgba(250,204,21,.08); }
        .wait-high { color: #f87171; border: 1px solid rgba(248,113,113,.5); background: rgba(248,113,113,.1); }
        .wait-closed { color: #94a3b8; border: 1px solid #475569; background: rgba(71,85,105,.25); }
        .sched-note { font-size: 8px; color: #67e8f9; opacity: .75; line-height: 1.3; font-weight: normal; }
    </style>
</head>
<body>

    <header class="p-4 glass-panel flex justify-between items-center border-b border-cyan-500/30 shrink-0 z-50 sticky top-0">
        <div>
            <h1 class="tomorrow-font text-base text-shadow-cyan tracking-widest font-bold italic text-cyan-300">EXTREME Disney</h1>
            <p id="current-park-display" class="text-[9px] text-cyan-500 tomorrow-font uppercase mt-0.5">Sector: TDL</p>
        </div>
        <div class="flex gap-1">
            <button onclick="resetAllLogs()" class="px-2 py-2 rounded-lg border border-red-900 bg-red-950/40 text-[8px] tomorrow-font text-red-400 uppercase tracking-widest">Reset</button>
            <button onclick="openDataModal()" class="px-2 py-2 rounded-lg border border-indigo-500 bg-indigo-900/40 text-[8px] font-bold tomorrow-font text-indigo-300 uppercase tracking-widest">Data</button>
            <button id="park-status-btn" onclick="toggleParkInOut()" class="px-3 py-2 rounded-lg border border-blue-500 bg-blue-900/40 text-[9px] font-bold tomorrow-font text-blue-300 uppercase tracking-widest transition-colors">IN PARK</button>
        </div>
    </header>

    <div id="toast-root"></div>

    <div id="in-park-dashboard" class="flex flex-col w-full flex-1 relative">

        <div id="cooldown-container" class="shrink-0 bg-slate-950/95 border-b border-cyan-900/50 p-2 z-40 hidden gap-3 shadow-lg sticky top-[72px]">
            <div id="dpa-timer-block" class="flex-1 glass-panel p-2 rounded-lg border-l-2 border-red-500 hidden relative">
                <div class="flex justify-between items-center mb-1">
                    <span class="tomorrow-font text-[9px] text-red-400 font-bold uppercase tracking-tighter flex items-center gap-1"><span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></span> DPA</span>
                    <div class="flex items-center gap-1.5">
                        <span id="dpa-timer-text" class="tomorrow-font text-[11px] text-red-300 font-bold">--:--</span>
                        <button onclick="clearCooldown('dpa')" class="tomorrow-font text-[8px] text-cyan-300 border border-cyan-500/50 bg-cyan-900/30 rounded px-1.5 py-0.5 font-bold uppercase active:bg-cyan-700">解除</button>
                    </div>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div id="dpa-timer-bar" class="h-full bg-red-500 transition-all" style="width: 0%"></div></div>
            </div>
            <div id="pp-timer-block" class="flex-1 glass-panel p-2 rounded-lg border-l-2 border-yellow-500 hidden relative">
                <div class="flex justify-between items-center mb-1">
                    <span class="tomorrow-font text-[9px] text-yellow-500 font-bold uppercase tracking-tighter flex items-center gap-1"><span class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-ping"></span> PP</span>
                    <div class="flex items-center gap-1.5">
                        <span id="pp-timer-text" class="tomorrow-font text-[11px] text-yellow-300 font-bold">--:--</span>
                        <button onclick="clearCooldown('pp')" class="tomorrow-font text-[8px] text-cyan-300 border border-cyan-500/50 bg-cyan-900/30 rounded px-1.5 py-0.5 font-bold uppercase active:bg-cyan-700">解除</button>
                    </div>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div id="pp-timer-bar" class="h-full bg-yellow-500 transition-all" style="width: 0%"></div></div>
            </div>
        </div>

        <div id="recording-overlay" class="mx-4 mt-4 hidden glass-panel neon-border rounded-2xl p-4 flex-col gap-3 recording-active z-30">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                    <div class="max-w-[150px]">
                        <h3 id="active-name" class="font-bold text-xs truncate uppercase">---</h3>
                        <p id="active-timer" class="tomorrow-font text-lg text-cyan-300">00:00:00</p>
                    </div>
                </div>
                <button onclick="stopRecording()" class="bg-red-600 text-white font-bold py-2 px-6 rounded-xl text-sm uppercase shadow-[0_0_15px_rgba(220,38,38,0.5)]">Finish</button>
            </div>
            <div id="live-cost-input-area" class="hidden gap-2 pt-3 border-t border-slate-700 items-center">
                <input type="number" id="live-item-cost" placeholder="Cost (¥)" class="flex-[3] bg-slate-900 border border-slate-700 py-2 px-3 rounded-xl text-base tomorrow-font outline-none focus:border-cyan-400 text-white">
                <button onclick="saveLiveCost()" id="live-cost-save-btn" class="flex-1 bg-yellow-500 text-black font-bold py-2 px-2 rounded-xl text-sm uppercase">Save</button>
            </div>
        </div>

        <main class="p-4 space-y-3">
            <div class="space-y-2">
                <div class="flex p-1 rounded-xl bg-slate-900/80 border border-slate-800">
                    <button onclick="switchPark('TDL')" id="btn-TDL" class="flex-1 py-3 rounded-lg text-xs font-bold transition-all bg-cyan-500 text-black uppercase tracking-widest">Land</button>
                    <button onclick="switchPark('TDS')" id="btn-TDS" class="flex-1 py-3 rounded-lg text-xs font-bold transition-all text-slate-400 uppercase tracking-widest">Sea</button>
                </div>
                <button onclick="openHoursModal()" class="w-full glass-panel px-4 py-2.5 rounded-xl border border-slate-800 flex justify-between items-center active:bg-cyan-900/30">
                    <span class="tomorrow-font text-[9px] text-cyan-400 uppercase tracking-[0.2em] font-bold">Park Hours</span>
                    <span id="park-hours-chip" class="tomorrow-font text-[10px] text-cyan-200 font-bold tracking-wider">--:-- 〜 --:--</span>
                </button>
                <div class="cost-display-bar py-3 relative overflow-hidden cursor-pointer" onclick="openCostHistory()">
                    <div id="budget-progress" class="absolute left-0 top-0 bottom-0 bg-cyan-500/40 w-0 transition-all duration-500"></div>
                    <div class="relative z-10 flex justify-between w-full items-center px-2">
                        <div class="flex flex-col">
                            <span class="tomorrow-font text-[10px] text-cyan-400 tracking-[0.2em] font-bold" id="budget-label">BUDGET: ¥30,000</span>
                            <span class="tomorrow-font text-[9px] text-slate-400 tracking-widest mt-0.5">TOTAL EXPENSES</span>
                        </div>
                        <span id="cost-display-value" class="tomorrow-font text-xl text-cyan-300 font-bold text-shadow-cyan">¥0</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button onclick="openCategory('attraction')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Attr</span></button>
                <button onclick="openCategory('show')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Show</span></button>
                <button onclick="openCategory('greeting')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Greet</span></button>
                <button onclick="openCategory('pass')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M12 2v20m10-10H2"></path></svg><span class="tomorrow-font text-[8px] text-red-400 font-bold uppercase">Pass</span></button>
                <button onclick="openCategory('food')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Food</span></button>
                <button onclick="openCategory('shop')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6zM3 6h18"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Shop</span></button>
                <button onclick="openCategory('rest')" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M3 12h18M3 6h18M3 18h18"></path></svg><span class="tomorrow-font text-[8px] text-cyan-400 uppercase">Rest</span></button>
                <button onclick="openCalculator()" class="glass-panel p-2 rounded-xl border border-slate-800 flex flex-col items-center active:bg-cyan-900/30"><svg class="category-icon"><path d="M12 1v22M17 5H7M17 19H7M17 12H7"></path></svg><span class="tomorrow-font text-[8px] text-yellow-400 font-bold uppercase">Cost</span></button>
            </div>

            <button onclick="openStatusMenu()" class="w-full glass-panel p-3 rounded-xl border border-slate-800 flex justify-center items-center gap-2 active:bg-cyan-900/30 bg-slate-800/40">
                <svg class="w-5 h-5 stroke-green-400 fill-none" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                <span class="tomorrow-font text-[10px] text-green-400 font-bold uppercase tracking-widest">Physical Status</span>
            </button>

            <div class="glass-panel p-3 rounded-xl border border-slate-800 cursor-pointer active:bg-cyan-900/30 transition-colors mt-2" onclick="openDailyMemoModal()">
                <div class="flex justify-between items-center mb-2">
                    <span class="tomorrow-font text-[10px] text-cyan-400 tracking-[0.2em] font-bold uppercase">Mission Notes</span>
                    <span class="text-cyan-600 text-sm">✎</span>
                </div>
                <div id="daily-memo-display" class="text-xs text-cyan-100 whitespace-pre-wrap min-h-[20px]"><span class="text-slate-500 italic">Tap to add notes...</span></div>
            </div>
        </main>

        <div id="timeline-wrapper" class="border-t border-cyan-500/20 glass-panel rounded-t-[2rem] w-full flex-1">
            <div onclick="openFullTimeline()" class="shrink-0 cursor-pointer active:bg-slate-900/50 flex justify-between items-center px-6 pt-6 pb-4 sticky top-0 bg-slate-950/95 backdrop-blur-xl z-10 rounded-t-[2rem] border-b border-cyan-900/30 transition-colors w-full">
                <h2 class="tomorrow-font text-xs text-cyan-400 tracking-[0.3em] font-bold uppercase flex items-center gap-2">Timeline <span class="text-[12px] opacity-70">🔍</span></h2>
                <div class="flex items-center gap-2">
                    <button onclick="event.stopPropagation(); openMemoEntryModal()" class="tomorrow-font text-[9px] text-pink-300 border border-pink-500/50 bg-pink-900/20 rounded-full px-3 py-1 font-bold uppercase tracking-widest active:bg-pink-900/50">+ Memo</button>
                    <span id="log-count" class="text-[10px] text-slate-500 tomorrow-font uppercase">0 Logged</span>
                </div>
            </div>
            <div id="timeline-list" class="space-y-2 pb-24 px-4 pt-2 w-full">
                <div class="text-center py-10"><p class="text-[9px] text-slate-600 tomorrow-font tracking-widest italic uppercase">Waiting for input...</p></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] hidden flex-col justify-end w-full">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div id="modal-container" class="glass-panel neon-border w-full rounded-t-[2.5rem] p-6 pt-3 relative z-[110] max-h-[85vh] overflow-y-auto" style="padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));">
            <div id="modal-grab" class="-mx-6 px-6 pt-1 pb-2 cursor-grab" style="touch-action: none;">
                <div class="w-10 h-1.5 bg-slate-600 rounded-full mx-auto mb-3"></div>
                <div class="flex justify-between items-center">
                    <h2 id="modal-title" class="tomorrow-font text-cyan-400 font-bold tracking-widest text-xs uppercase">SELECT</h2>
                    <button onclick="closeModal()" class="text-2xl w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full pb-1">×</button>
                </div>
            </div>
            <div id="modal-content" class="pt-3"></div>
        </div>
    </div>

    <div id="confirm-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[200] hidden flex-col justify-end items-center w-full">
        <div class="absolute inset-0" onclick="resolveConfirm(false)"></div>
        <div id="confirm-card" class="glass-panel neon-border w-full rounded-t-[2rem] p-6 relative z-10" style="padding-bottom: calc(2rem + env(safe-area-inset-bottom));">
            <div class="w-10 h-1.5 bg-slate-600 rounded-full mx-auto mb-4"></div>
            <h3 id="confirm-title" class="tomorrow-font text-cyan-300 font-bold tracking-widest text-sm uppercase text-center mb-2">CONFIRM</h3>
            <p id="confirm-msg" class="text-xs text-slate-300 text-center mb-6 whitespace-pre-wrap leading-relaxed"></p>
            <div class="flex gap-3">
                <button onclick="resolveConfirm(false)" class="flex-1 bg-slate-800 border border-slate-600 text-slate-300 font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest">キャンセル</button>
                <button id="confirm-ok" onclick="resolveConfirm(true)" class="flex-1 bg-cyan-500 text-black font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest">OK</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. マスターデータ (2026/06 公式情報ベースで更新)
        //    en: ThemeParks.wiki API 待ち時間マッチング用英語名
        //    sched: ショー等の公演目安 (当日の正確な時刻は公式アプリ参照)
        // ==========================================
        const masterData = [
            // ---- TDL アトラクション ----
            { park:'TDL', type:'attraction', area:'アドベンチャー', name:'カリブの海賊', en:'Pirates of the Caribbean' },
            { park:'TDL', type:'attraction', area:'アドベンチャー', name:'ジャングルクルーズ', en:'Jungle Cruise: Wildlife Expeditions' },
            { park:'TDL', type:'attraction', area:'ウエスタン', name:'ビッグサンダー・マウンテン', en:'Big Thunder Mountain' },
            { park:'TDL', type:'attraction', area:'クリッター', name:'スプラッシュ・マウンテン', en:'Splash Mountain' },
            { park:'TDL', type:'attraction', area:'ファンタジー', name:'美女と野獣“魔法のものがたり”', en:'Enchanted Tale of Beauty and the Beast' },
            { park:'TDL', type:'attraction', area:'ファンタジー', name:'プーさんのハニーハント', en:"Pooh's Hunny Hunt" },
            { park:'TDL', type:'attraction', area:'ファンタジー', name:'ホーンテッドマンション', en:'Haunted Mansion' },
            { park:'TDL', type:'attraction', area:'ファンタジー', name:'ピーターパン空の旅', en:"Peter Pan's Flight" },
            { park:'TDL', type:'attraction', area:'トゥモロー', name:'ベイマックスのハッピーライド', en:'The Happy Ride with Baymax' },
            { park:'TDL', type:'attraction', area:'トゥモロー', name:'スター・ツアーズ', en:'Star Tours' },
            { park:'TDL', type:'attraction', area:'トゥモロー', name:'モンスターズ・インク', en:'Monsters, Inc. Ride & Go Seek!' },
            // ---- TDL ショー (2026/06時点: クラブマウスビートは3/31終演のため削除) ----
            { park:'TDL', type:'show', area:'パレード', name:'ハーモニー・イン・カラー', sched:'デイパレード / 約45分' },
            { park:'TDL', type:'show', area:'パレード', name:'エレクトリカルパレード・ドリームライツ', sched:'ナイトパレード / 約20分' },
            { park:'TDL', type:'show', area:'ステージ/夜', name:'Reach for the Stars', sched:'城前プロジェクション / 夜1回・約20分' },
            { park:'TDL', type:'show', area:'ステージ/夜', name:'ミッキーのマジカルミュージックワールド', sched:'1日4回 / エントリー・DPA' },
            { park:'TDL', type:'show', area:'ステージ/夜', name:'ジャンボリミッキー！レッツ・ダンス！', sched:'1日5回 / エントリー' },
            { park:'TDL', type:'show', area:'ステージ/夜', name:'スカイ・フル・オブ・カラーズ (花火)', sched:'約5分 ※6/15〜9/14休止' },
            { park:'TDL', type:'show', area:'ステージ/夜', name:'ミッキーのレインボー・ルアウ', sched:'要事前予約 / 約55分' },

        // ==========================================
        // 2. グローバル変数 & 初期化
        // ==========================================
        let currentPark = 'TDL'; let currentRecord = null; let timerId = null; let history = []; let costHistory = []; let totalCost = 0; let budget = 30000; let dailyMemo = ""; let isInPark = false;
        let dpaCooldownTime = null; let ppCooldownTime = null; let sortableTimeline = null;
        let hoursManual = { TDL: null, TDS: null }; // {open, close, date}

        // ThemeParks.wiki API (東京ディズニーリゾート公式運営データのミラー)
        const PARK_IDS = { TDL: '3cc919f1-d16d-43e0-8c3f-1dd269bd1a42', TDS: '67b290d5-3478-4f23-b601-2f8fb71ba803' };
        let parkSchedules = { TDL: {}, TDS: {} };  // 'YYYY-MM-DD' -> {open:'09:00', close:'21:00'}

        const getCurrentTime = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
        const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

        function saveData(){
            localStorage.setItem('extremeDisneyData', JSON.stringify({ history, costHistory, totalCost, budget, dailyMemo, isInPark, dpaCooldownTime: dpaCooldownTime?.getTime(), ppCooldownTime: ppCooldownTime?.getTime(), hoursManual, currentPark }));
        }

        // ==========================================
        // 3. ネイティブ風 UI 部品 (Toast / Confirm / Sheet)
        // ==========================================
        function toast(msg, type='info'){
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            el.className = 'toast' + (type==='error' ? ' toast-error' : '');
            el.textContent = msg;
            root.appendChild(el);
            setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(-8px)'; setTimeout(()=>el.remove(), 400); }, 2200);
        }

        let confirmResolve = null;
        function confirmSheet({title='確認', message='', okLabel='OK', danger=false}={}){
            return new Promise(res => {
                confirmResolve = res;
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-msg').innerText = message;
                const ok = document.getElementById('confirm-ok');
                ok.innerText = okLabel;
                ok.className = `flex-1 font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest ${danger ? 'bg-red-600 text-white shadow-[0_0_15px_rgba(220,38,38,0.4)]' : 'bg-cyan-500 text-black'}`;
                const ov = document.getElementById('confirm-overlay');
                ov.classList.remove('hidden'); ov.classList.add('flex');
                requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('confirm-open')));
            });
        }
        function resolveConfirm(v){
            haptic(10);
            const ov = document.getElementById('confirm-overlay');
            ov.classList.remove('confirm-open');
            setTimeout(()=>{ ov.classList.add('hidden'); ov.classList.remove('flex'); }, 260);
            if(confirmResolve){ const r=confirmResolve; confirmResolve=null; r(v); }
        }

        function showModal(){
            const ov = document.getElementById('modal-overlay');
            ov.classList.remove('hidden'); ov.classList.add('flex');
            requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('modal-open')));
        }
        function closeModal(){
            currentCategoryType = null;
            const ov = document.getElementById('modal-overlay'); const mc = document.getElementById('modal-container');
            ov.classList.remove('modal-open');
            setTimeout(()=>{ ov.classList.add('hidden'); ov.classList.remove('flex'); mc.style.transform=''; mc.style.transition=''; }, 320);
        }

        async function copyText(t, msg='コピーしました'){
            try { await navigator.clipboard.writeText(t); }
            catch(e){ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{ document.execCommand('copy'); }catch(_){} ta.remove(); }
            toast(msg);
        }

        (function(){
            const grab = document.getElementById('modal-grab'); const mc = document.getElementById('modal-container');
            let startY = null, dy = 0;
            grab.addEventListener('touchstart', e=>{ startY = e.touches[0].clientY; dy = 0; mc.style.transition = 'none'; }, {passive:true});
            grab.addEventListener('touchmove', e=>{ if(startY==null) return; dy = e.touches[0].clientY - startY; if(dy > 0) mc.style.transform = `translateY(${dy}px)`; }, {passive:true});

        }

        // ==========================================
        // 4. 営業時間 (公式運営データを自動取得)
        // ==========================================
        async function fetchSchedules(){
            for(const park of ['TDL','TDS']){
                try {
                    const r = await fetch(`https://api.themeparks.wiki/v1/entity/${PARK_IDS[park]}/schedule`);
                    if(!r.ok) continue;
                    const d = await r.json();
                    (d.schedule || []).forEach(s => {
                        if(s.type === 'OPERATING' && s.openingTime && s.closingTime){
                            parkSchedules[park][s.date] = { open: s.openingTime.slice(11,16), close: s.closingTime.slice(11,16) };
                        }
                    });
                } catch(e) {}
            }
            updateCloseCountdown();
        }
        function getHoursFor(park, dateStr){
            const m = hoursManual[park];
            if(m && m.date === dateStr) return { ...m, manual: true };
            return parkSchedules[park][dateStr] || null;
        }
        function updateCloseCountdown(){
            const chip = document.getElementById('park-hours-chip');
            const h = getHoursFor(currentPark, todayStr());
            if(!h){ chip.innerText = '未取得 (タップで設定)'; return; }
            const now = new Date();
            const [oh,om] = h.open.split(':').map(Number); const [ch,cm] = h.close.split(':').map(Number);
            const openD = new Date(); openD.setHours(oh,om,0,0);
            const closeD = new Date(); closeD.setHours(ch,cm,0,0);
            let suffix = '';
            if(now < openD){ const diff = openD - now; suffix = ` ・ 開園まで ${Math.floor(diff/3600000)}:${String(Math.floor(diff%3600000/60000)).padStart(2,'0')}`; }
            else if(now < closeD){ const diff = closeD - now; suffix = ` ・ 閉園まで ${Math.floor(diff/3600000)}:${String(Math.floor(diff%3600000/60000)).padStart(2,'0')}`; }
            else { suffix = ' ・ 閉園'; }
            chip.innerText = `${h.open}〜${h.close}${h.manual?' (手動)':''}${suffix}`;
        }
        function openHoursModal(){
            haptic(10);
            const h = getHoursFor(currentPark, todayStr()) || { open:'09:00', close:'21:00' };
            document.getElementById('modal-title').innerText = `${currentPark} PARK HOURS`;
            document.getElementById('modal-content').innerHTML = `
                <p class="text-[10px] text-slate-400 mb-4 leading-relaxed">営業時間は公式運営データから自動取得されます。通信できない場合やイベント日はここで手動設定できます。</p>
                <div class="flex gap-3 mb-4">
                    <div class="flex-1"><label class="text-[10px] text-cyan-400 uppercase">Open</label><input id="h-open" type="time" value="${h.open}" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white mt-1"></div>
                    <div class="flex-1"><label class="text-[10px] text-cyan-400 uppercase">Close</label><input id="h-close" type="time" value="${h.close}" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white mt-1"></div>
                </div>
                <button onclick="saveManualHours()" class="w-full bg-cyan-500 text-black font-bold py-3.5 rounded-xl uppercase tracking-widest text-xs mb-2">手動設定を保存</button>
                <button onclick="resyncHours()" class="w-full bg-slate-800 border border-cyan-700 text-cyan-300 font-bold py-3.5 rounded-xl uppercase tracking-widest text-xs">公式データを再取得</button>`;
            showModal();
        }
        function saveManualHours(){ const o=document.getElementById('h-open').value, c=document.getElementById('h-close').value; if(o&&c){ hoursManual[currentPark]={open:o, close:c, date:todayStr()}; saveData(); updateCloseCountdown(); closeModal(); toast(`${currentPark} 営業時間を設定しました`); } }
        async function resyncHours(){ hoursManual[currentPark]=null; saveData(); closeModal(); toast('公式データを取得中...'); await fetchSchedules(); const h=getHoursFor(currentPark, todayStr()); toast(h ? `本日の${currentPark}: ${h.open}〜${h.close}` : '取得できませんでした', h?'info':'error'); }

        // ==========================================
        // 5. リアルタイム待ち時間 (公式運営データ)
        // ==========================================
        async function fetchLive(park, force=false){
            const c = liveCache[park];
            if(!force && c && Date.now() - c.fetchedAt < 3*60*1000) return c;
            const r = await fetch(`https://api.themeparks.wiki/v1/entity/${PARK_IDS[park]}/live`);
            if(!r.ok) throw new Error('live fetch failed');
            const d = await r.json();
            liveCache[park] = { fetchedAt: Date.now(), items: d.liveData || [] };
            return liveCache[park];
        }
        function findLive(park, spot){
            if(!spot.en || !liveCache[park]) return null;
            const en = spot.en.toLowerCase();
            const items = liveCache[park].items;
            let hit = items.find(i => (i.name||'').toLowerCase() === en);
            if(!hit) hit = items.find(i => (i.name||'').toLowerCase().includes(en) || en.includes((i.name||'').toLowerCase()));
            if(!hit) return null;
            return { status: hit.status, wait: hit.queue?.STANDBY?.waitTime ?? null };
        }
        function waitBadgeHtml(park, spot){
            const live = findLive(park, spot);
            if(!live) return '';
            if(live.status && live.status !== 'OPERATING') return '<span class="wait-badge wait-closed">休止中</span>';
            if(live.wait == null) return '<span class="wait-badge wait-low">運営中</span>';
            const cls = live.wait >= 60 ? 'wait-high' : live.wait >= 30 ? 'wait-mid' : 'wait-low';
            return `<span class="wait-badge ${cls}">${live.wait}分待ち</span>`;
        }
        async function refreshLive(){
            haptic(10); toast('待ち時間を更新中...');
            try { await fetchLive(currentPark, true); if(currentCategoryType) openCategory(currentCategoryType, true); toast('待ち時間を更新しました'); }
            catch(e){ toast('待ち時間を取得できませんでした', 'error'); }
        }

        function startCooldown(type){ const now=new Date(); if(type==='dpa') dpaCooldownTime=new Date(now.getTime()+60*60000); if(type==='pp') ppCooldownTime=new Date(now.getTime()+120*60000); saveData(); updateCooldownDisplay(); }
        function updateCooldownDisplay(){
            const now=new Date(); let any=false; const db=document.getElementById('dpa-timer-block'), pb=document.getElementById('pp-timer-block');
            if(dpaCooldownTime && dpaCooldownTime>now){ any=true; db.classList.remove('hidden'); const diff=dpaCooldownTime-now; document.getElementById('dpa-timer-text').innerText=`${Math.floor(diff/60000)}:${String(Math.floor((diff%60000)/1000)).padStart(2,'0')}`; document.getElementById('dpa-timer-bar').style.width=`${(diff/3600000)*100}%`; } else { db.classList.add('hidden'); dpaCooldownTime=null; }
            if(ppCooldownTime && ppCooldownTime>now){ any=true; pb.classList.remove('hidden'); const diff=ppCooldownTime-now; document.getElementById('pp-timer-text').innerText=`${Math.floor(diff/60000)}:${String(Math.floor((diff%60000)/1000)).padStart(2,'0')}`; document.getElementById('pp-timer-bar').style.width=`${(diff/7200000)*100}%`; } else { pb.classList.add('hidden'); ppCooldownTime=null; }
            document.getElementById('cooldown-container').classList.toggle('hidden',!any);
        }
        function markPassUsed(id, type){ haptic(30); const log=history.find(h=>h.id===id); if(log){ log.passUsed=true; if(type==='dpa') dpaCooldownTime=null; if(type==='pp') ppCooldownTime=null; saveData(); renderTimeline(); updateCooldownDisplay(); toast('パス使用済みにしました'); } }
        function clearCooldown(type){ haptic(20); if(type==='dpa') dpaCooldownTime=null; if(type==='pp') ppCooldownTime=null; saveData(); updateCooldownDisplay(); toast(`${type.toUpperCase()} クールダウンを解除しました`); }

        function openCategory(type, silent=false){
            if(!silent) haptic(10);
            currentCategoryType = type;
            const content=document.getElementById('modal-content'); document.getElementById('modal-title').innerText=type.toUpperCase(); content.innerHTML='';
            // 待ち時間バー (アトラクション・グリーティングのみ)
            if(type==='attraction' || type==='greeting'){
                const c = liveCache[currentPark];
                const updated = c ? new Date(c.fetchedAt) : null;
                const bar = document.createElement('div');
                bar.className = 'flex justify-between items-center mb-4 bg-slate-900/60 border border-cyan-900/50 rounded-xl px-3 py-2';
                bar.innerHTML = `<span class="text-[9px] text-cyan-500 tomorrow-font tracking-widest uppercase">Wait Times ${updated ? '・'+String(updated.getHours()).padStart(2,'0')+':'+String(updated.getMinutes()).padStart(2,'0')+'更新' : '・未取得'}</span><button onclick="refreshLive()" class="text-[9px] tomorrow-font font-bold text-cyan-300 bg-cyan-900/40 border border-cyan-600 px-3 py-1.5 rounded-lg uppercase tracking-widest">↻ 更新</button>`;
                content.appendChild(bar);
                // 古ければ自動取得
                if(!c || Date.now() - c.fetchedAt > 3*60*1000){
                    fetchLive(currentPark).then(()=>{ if(currentCategoryType===type) openCategory(type, true); }).catch(()=>{});
                }
            }
            const filtered=masterData.filter(d=>d.park===currentPark && d.type===type); const groups=filtered.reduce((a,o)=>{(a[o.area]=a[o.area]||[]).push(o);return a;},{});
            for(const area in groups){
                const div=document.createElement('div'); div.innerHTML=`<h3 class="text-[8px] text-slate-500 mb-2 font-bold uppercase tracking-widest">>>> ${esc(area)}</h3>`;
                const grid=document.createElement('div'); grid.className="grid grid-cols-2 gap-2 mb-4 w-full";
                groups[area].forEach(spot=>{
                    const held=spot.passType==='dpa' && history.some(h=>h.name.includes(spot.name)&&!h.passUsed);
                    const btn=document.createElement('button'); btn.className=`glass-panel rounded-xl text-white rect-btn p-2 w-full ${held?'opacity-20 pointer-events-none':'active:bg-cyan-900'}`;
                    const schedHtml = spot.sched ? `<span class="sched-note">${esc(spot.sched)}</span>` : '';
                    btn.innerHTML=`<span class="truncate w-full">${esc(spot.name)}</span>${schedHtml}${spot.price?`<span class="text-yellow-400 text-[9px]">¥${spot.price}</span>`:''}${waitBadgeHtml(currentPark, spot)}`;
                    btn.onclick=()=>{ closeModal(); haptic(15); if(spot.passType){ const time=getCurrentTime(); const log=addTimelineHistory(`取得: ${spot.name}`,time,time,spot.price?`¥${spot.price}`:'---',spot.price?'cost':'info'); log.passType=spot.passType; log.passUsed=false; if(spot.price) addCost(spot.name,spot.price,time); if(spot.passType==='dpa'||spot.passType==='pp') startCooldown(spot.passType); saveData(); toast(`${spot.name} を記録しました`); } else { startRecording(spot); } };
                    grid.appendChild(btn);
                });
                div.appendChild(grid); content.appendChild(div);
            }
            if(!silent) showModal();
        }

            if(h.status==='active') return 'border-red-500';
            if(h.status==='cost') return 'border-yellow-500';
            if(h.status==='info') return 'border-slate-600';

        function addTimelineHistory(name, start, end, duration, status){ const log={id:Date.now(),name,start,end,duration,status,memo:'',passType:null,passUsed:false}; history.push(log); saveData(); renderTimeline(true); return log; }
        function renderTimeline(scroll=false){
            const list=document.getElementById('timeline-list'); list.innerHTML='';
            if(history.length===0){ list.innerHTML='<div class="text-center py-10"><p class="text-[9px] text-slate-600 tomorrow-font tracking-widest italic uppercase">Waiting for input...</p></div>'; }
            history.forEach((h,i)=>{
                const div=document.createElement('div'); div.className=`flex justify-between items-start glass-panel p-3 rounded-xl border-l-2 ${statusBorder(h)} w-full`;

                const usedBtn=(h.passType&&(h.passType==='dpa'||h.passType==='pp')&&!h.passUsed)?`<button onclick="markPassUsed(${h.id},'${h.passType}')" class="mt-2 bg-cyan-900/50 border border-cyan-500 text-cyan-100 text-[8px] px-2 py-1 rounded font-bold uppercase active:bg-cyan-700 transition-colors">Mark as Used</button>`:(h.passUsed?`<span class="mt-2 block text-[8px] text-slate-500 uppercase font-bold italic">Passed/Used</span>`:'');
                const isMemo=h.status==='memo';

                    ? `<div class="flex justify-between items-center mb-1"><p class="tomorrow-font text-[9px] text-pink-400 uppercase tracking-widest">💭 Memo</p><button onclick="event.stopPropagation();openMemoEditModal(${i})" class="text-pink-400 text-xs px-1 -mr-1">✎</button></div><p onclick="this.classList.toggle('line-clamp-2')" class="text-sm font-bold text-pink-100 w-full whitespace-pre-wrap cursor-pointer line-clamp-2">${esc(h.name)}</p>`
                    : `<p class="text-base font-bold ${h.status==='active'?'text-red-400 animate-pulse':'text-white'} truncate">${esc(h.name)}</p>`;
                const subMemoHtml = isMemo ? '' : `<input type="text" placeholder="Add memo..." value="${esc(h.memo)}" onchange="history[${i}].memo=this.value;saveData();" class="bg-transparent border-b border-slate-700 tomorrow-font tracking-widest text-cyan-100 w-full mt-1.5 pb-0.5 outline-none focus:border-cyan-400" style="font-size:10px !important;">`;
                div.innerHTML=`<div class="flex-[3] pr-2 min-w-0">${nameHtml}<p class="tomorrow-font text-base text-slate-400 uppercase mt-1 cursor-pointer truncate" onclick="openEditTimeModal(${i})">T-MARK: <span class="text-cyan-300 underline">${esc(h.start)}</span> ${isTimeRange?`〜 <span class="text-cyan-300 underline">${esc(h.end)}</span>`:''} <span class="ml-1 text-cyan-600 text-sm">✎</span></p>${usedBtn}${subMemoHtml}</div><div class="flex-1 flex flex-col items-end gap-1 mt-0.5 min-w-[50px]"><button onclick="deleteLog(${i})" class="w-6 h-6 rounded bg-red-950/30 text-red-500 text-xs flex items-center justify-center">×</button><p class="tomorrow-font text-sm text-cyan-400 font-bold mt-1 tracking-wider whitespace-nowrap text-right" id="duration-${h.id}">${esc(h.duration)}</p></div>`;
                list.appendChild(div);

            document.getElementById('log-count').innerText=`${history.length} LOGS`;
            if(sortableTimeline) sortableTimeline.destroy();

            if(scroll) setTimeout(()=>{window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});}, 50);

        async function deleteLog(i){ haptic(10); const l=history[i]; if(await confirmSheet({title:'ログ削除', message:`「${l.name}」を削除しますか？`, okLabel:'削除', danger:true})){ if(l.duration.includes('¥')){ const amt=parseInt(l.duration.split('¥')[1].replace(/[^0-9]/g,''))||0; const idx=costHistory.findIndex(c=>c.time===l.start&&c.amount===amt); if(idx>-1){ costHistory.splice(idx,1); totalCost-=amt; updateCostDisplay(); } } history.splice(i,1); saveData(); renderTimeline(); toast('削除しました'); } }

        function startRecording(spot){
            haptic(20); if(currentRecord) stopRecording(); const now=new Date(), time=getCurrentTime();
            currentRecord={...spot, startTimeObj:now}; document.getElementById('active-name').innerText=spot.name;
            document.getElementById('recording-overlay').classList.remove('hidden'); document.getElementById('recording-overlay').classList.add('flex');
            const liveArea=document.getElementById('live-cost-input-area');
            if(spot.type==='shop'||spot.type==='food'){ liveArea.classList.remove('hidden'); liveArea.classList.add('flex'); document.getElementById('live-item-cost').value=''; document.getElementById('live-item-cost').disabled=false; const btn=document.getElementById('live-cost-save-btn'); btn.innerText='Save'; btn.disabled=false; btn.className='flex-1 bg-yellow-500 text-black font-bold py-2 px-2 rounded-xl text-sm uppercase min-w-[70px]'; } else { liveArea.classList.remove('flex'); liveArea.classList.add('hidden'); }
            currentRecord.tlRef=addTimelineHistory(spot.name,time,'---','00:00:00','active');
            currentRecord.tlRef.startTs = now.getTime(); currentRecord.tlRef.type = spot.type; saveData();
            if(timerId) clearInterval(timerId); timerId=setInterval(updateActiveTimer,1000); window.scrollTo({top:0, behavior:'smooth'});
        }
        function updateActiveTimer(){ if(!currentRecord) return; const diff=Math.floor((new Date()-currentRecord.startTimeObj)/1000); const f=`${String(Math.floor(diff/3600)).padStart(2,'0')}:${String(Math.floor((diff%3600)/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`+(currentRecord.savedCost?` / ¥${currentRecord.savedCost}`:''); document.getElementById('active-timer').innerText=f; const tl=document.getElementById(`duration-${currentRecord.tlRef.id}`); if(tl) tl.innerText=f; }
        function stopRecording(){ if(!currentRecord) return; haptic(30); const diff=Math.floor((new Date()-currentRecord.startTimeObj)/1000); currentRecord.tlRef.end=getCurrentTime(); currentRecord.tlRef.duration=`${Math.floor(diff/60)}m ${diff%60}s`+(currentRecord.savedCost?` / ¥${currentRecord.savedCost}`:''); currentRecord.tlRef.status='finished'; saveData(); clearInterval(timerId); const finishedName=currentRecord.name; currentRecord=null; document.getElementById('recording-overlay').classList.add('hidden'); document.getElementById('recording-overlay').classList.remove('flex'); renderTimeline(); toast(`${finishedName} 完了！`); }

        function saveEdits(i){ const l=history[i], ns=document.getElementById('e-st').value; if(ns) l.start=ns; if(l.status==='finished'){ const ne=document.getElementById('e-ed').value; if(ne) l.end=ne; if(l.start&&l.end&&l.start!=='---'&&l.end!=='---'){ const sD=new Date(),eD=new Date(); sD.setHours(...l.start.split(':'),0); eD.setHours(...l.end.split(':'),0); if(eD<sD) eD.setDate(eD.getDate()+1); const diff=(eD-sD)/1000; l.duration=`${Math.floor(diff/60)}m ${diff%60}s`+(l.duration.includes(' / ¥')?' / ¥'+l.duration.split(' / ¥')[1]:''); } } const cI=document.getElementById('e-ct'); if(cI){ const nc=parseInt(cI.value)||0; let oc=0; if(l.duration.includes('¥')) oc=parseInt(l.duration.split('¥')[1].replace(/[^0-9]/g,''))||0; if(oc!==nc){ const nm=l.name.replace('購入: ',''); if(oc>0){ const idx=costHistory.findIndex(c=>c.time===l.start&&c.amount===oc); if(idx>-1){ costHistory.splice(idx,1); totalCost-=oc; } } if(nc>0){ costHistory.push({name:nm,amount:nc,time:ns||l.start}); totalCost+=nc; } if(l.status==='cost') l.duration=nc>0?`¥${nc}`:''; else l.duration=nc>0?`${l.duration.split(' / ¥')[0]} / ¥${nc}`:l.duration.split(' / ¥')[0]; } } updateCostDisplay(); saveData(); renderTimeline(false); closeModal(); toast('更新しました'); }
        function openCalculator(){ haptic(10); document.getElementById('modal-title').innerText="COST ADD"; document.getElementById('modal-content').innerHTML=`<div class="space-y-4 w-full"><input id="c-name" type="text" placeholder="Item Name" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white"><input id="c-price" type="number" placeholder="Cost (¥)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white"><button onclick="const n=document.getElementById('c-name').value||'Others',p=parseInt(document.getElementById('c-price').value);if(p>0){const t=getCurrentTime();addCost(n,p,t);addTimelineHistory('購入: '+n,t,t,'¥'+p,'cost');closeModal();toast('¥'+p.toLocaleString()+' を記録しました');}" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl uppercase tracking-widest">Add Expense</button></div>`; showModal(); }
        function openCostHistory(){ haptic(10); document.getElementById('modal-title').innerText="EXPENSE BREAKDOWN"; document.getElementById('modal-content').innerHTML=`<div class="mb-4 bg-slate-900 p-3 rounded-xl border border-slate-700 w-full"><label class="text-[9px] text-cyan-400 uppercase">Set Budget Limit (¥)</label><div class="flex gap-2 w-full"><input id="b-input" type="number" value="${budget}" class="flex-[3] bg-slate-800 border border-slate-600 p-2 rounded-lg text-white min-w-0"><button onclick="budget=parseInt(document.getElementById('b-input').value)||0;saveData();updateCostDisplay();closeModal();toast('予算を更新しました');" class="flex-1 bg-cyan-700 px-2 rounded-lg text-[10px] text-cyan-100 font-bold min-w-[50px] uppercase">Set</button></div></div><div class="space-y-1 mb-4 max-h-[35vh] overflow-y-auto w-full">${costHistory.map((c,j)=>`<div class="flex justify-between items-center p-3 border-b border-slate-800 text-xs"><span>${esc(c.time)} | ${esc(c.name)}</span><div class="flex items-center gap-2"><span class="text-yellow-400 font-bold">¥${c.amount.toLocaleString()}</span><button onclick="deleteCostEntry(${j})" class="w-5 h-5 rounded bg-red-950/30 text-red-500 text-[10px] flex items-center justify-center shrink-0">×</button></div></div>`).join('')||'<p class="text-center py-10 text-[9px] text-slate-600 tomorrow-font uppercase">No expenses</p>'}</div><button onclick="copyCostLog()" class="w-full bg-cyan-500 text-black py-3 rounded-xl font-bold text-[10px] uppercase">Copy Cost List</button>`; showModal(); }
        async function deleteCostEntry(j){ haptic(10); const c=costHistory[j]; if(await confirmSheet({title:'コスト削除', message:`「${c.name} ¥${c.amount.toLocaleString()}」を削除しますか？`, okLabel:'削除', danger:true})){ costHistory.splice(j,1); totalCost-=c.amount; const h=history.find(hh=>hh.start===c.time && hh.duration.includes('¥') && parseInt(hh.duration.split('¥')[1].replace(/[^0-9]/g,''))===c.amount); if(h){ if(h.status==='cost'){ history.splice(history.indexOf(h),1); } else { h.duration=h.duration.split(' / ¥')[0]; } } updateCostDisplay(); saveData(); renderTimeline(); openCostHistory(); toast('削除しました'); } }
        function openFullTimeline(){ haptic(10); const content=document.getElementById('modal-content'); document.getElementById('modal-title').innerText="FULL TIMELINE"; const html = history.map(h=>{ const tr = (h.status==='active'||h.status==='finished')?`${esc(h.start)}〜${esc(h.end)}`:esc(h.start); const dur = h.duration.includes('¥') ? esc(h.duration).replace(/(¥[0-9,]+)/, '<span class="text-yellow-400 font-bold">$1</span>') : esc(h.duration); const memo = h.memo ? `<div class="text-[10px] text-cyan-200 mt-1 pl-2 border-l-2 border-cyan-700 whitespace-pre-wrap">${esc(h.memo)}</div>` : ''; return `<div class="p-3 border-b border-slate-800/80"><div class="flex justify-between gap-2 items-start"><span class="text-cyan-400 text-[10px] tomorrow-font whitespace-nowrap">${tr}</span><span class="text-white font-bold text-xs flex-1">${esc(h.name)}</span><span class="text-slate-400 text-[10px] tomorrow-font text-right">${dur}</span></div>${memo}</div>`; }).join(''); content.innerHTML=`<div class="space-y-1 mb-4 max-h-[60vh] overflow-y-auto bg-slate-900/50 rounded-xl border border-slate-700 p-1 w-full">${html||'<p class="text-center py-10 text-[9px] text-slate-600 tomorrow-font uppercase">No logs yet</p>'}</div><button onclick="copyTextLog()" class="w-full bg-cyan-500 text-black py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Copy Timeline</button>`; showModal(); }

        // Data Export
        function openDataModal(){ haptic(10); document.getElementById('modal-title').innerText="DATA MANAGEMENT"; document.getElementById('modal-content').innerHTML=`<div class="space-y-6 w-full"><div><h3 class="text-[10px] text-cyan-400 font-bold mb-2">TEXT EXPORT (PARK LOGS)</h3><button onclick="copyTextLog()" class="w-full bg-cyan-900 text-cyan-100 py-3 rounded-xl text-[10px] tomorrow-font border border-cyan-500 font-bold mb-2 uppercase">Copy Text Log</button><button onclick="copyMarkdownLog()" class="w-full bg-indigo-900 text-indigo-100 py-3 rounded-xl text-[10px] tomorrow-font border border-indigo-500 font-bold uppercase">Copy Markdown (Blog)</button></div><div class="border-t border-slate-700 pt-4"><h3 class="text-[10px] text-cyan-400 font-bold mb-2">SYSTEM BACKUP (JSON)</h3><textarea id="json-data-area" rows="4" class="w-full bg-slate-900 border border-slate-700 p-2 rounded-xl text-[9px] font-mono text-cyan-100 mb-2"></textarea><div class="flex gap-2"><button onclick="generateJson()" class="flex-1 bg-slate-700 text-white py-3 rounded-xl text-[10px] font-bold">EXPORT</button><button onclick="importJson()" class="flex-1 bg-red-900/80 border border-red-500 text-white py-3 rounded-xl text-[10px] font-bold">IMPORT</button></div></div></div>`; showModal(); }
        async function copyCostLog(){ await copyText(costHistory.map(c=>`${c.time} | ${c.name} : ¥${c.amount}`).join('\n')+`\nTOTAL: ¥${totalCost}`, 'コスト一覧をコピーしました'); }
        async function copyTextLog(){ let t=`=== MISSION NOTES ===\n${dailyMemo||'None'}\n\n`+history.map(h=>`${h.start}${h.status!=='cost'?'〜'+h.end:''} | ${h.name} (${h.duration})${h.memo?'\n └ '+h.memo:''}`).join('\n')+`\n\n--- COST ---\n`+costHistory.map(c=>`${c.time} | ${c.name} : ¥${c.amount}`).join('\n')+`\nTOTAL: ¥${totalCost}`; await copyText(t, 'テキストログをコピーしました'); }
        async function copyMarkdownLog(){ let md=`# EXTREME Disney Log\n\n## Mission Notes\n${dailyMemo||'None'}\n\n`+history.map(h=>`## ${h.start}${h.status!=='cost'?'〜'+h.end:''} ${h.name}\n\n* **記録**: ${h.duration}\n\n[画像挿入位置]\n\n${h.memo||''}`).join('\n\n---\n\n')+`\n\n---\n\n## Cost Breakdown\n\n`+costHistory.map(c=>`* ${c.time} | **${c.name}**: ¥${c.amount.toLocaleString()}`).join('\n')+`\n\n**TOTAL: ¥${totalCost.toLocaleString()}**`; await copyText(md, 'Markdownをコピーしました'); }
        function generateJson(){ const j=JSON.stringify({history,costHistory,totalCost,budget,dailyMemo,isInPark,dpaCooldownTime:dpaCooldownTime?dpaCooldownTime.getTime():null,ppCooldownTime:ppCooldownTime?ppCooldownTime.getTime():null,hoursManual,currentPark}); document.getElementById('json-data-area').value=j; copyText(j, 'バックアップJSONをコピーしました'); }
        async function importJson(){ try{ const d=JSON.parse(document.getElementById('json-data-area').value); if(await confirmSheet({title:'データ復元', message:'現在のデータを上書きして復元します。よろしいですか？', okLabel:'復元する', danger:true})){ localStorage.setItem('extremeDisneyData',JSON.stringify(d)); location.reload(); } }catch(e){ toast('JSONが不正です', 'error'); } }

        // Start
        window.onload = () => {
            setInterval(() => { updateCloseCountdown(); updateCooldownDisplay(); }, 1000);
            const saved = localStorage.getItem('extremeDisneyData');
            if(saved){
                const d = JSON.parse(saved); history=d.history||[]; costHistory=d.costHistory||[]; totalCost=d.totalCost||0; budget=d.budget||30000; dailyMemo=d.dailyMemo||""; isInPark=d.isInPark||false;
                if(d.hoursManual) hoursManual=d.hoursManual; if(d.currentPark) currentPark=d.currentPark;
                if(d.dpaCooldownTime) dpaCooldownTime=new Date(d.dpaCooldownTime); if(d.ppCooldownTime) ppCooldownTime=new Date(d.ppCooldownTime);
                applyModeUI(); switchPark(currentPark); renderTimeline(); updateCostDisplay(); document.getElementById('daily-memo-display').innerText=dailyMemo||'Tap to add notes...';
                const active = history.find(h=>h.status==='active');
                if(active){
                    currentRecord={name:active.name, startTimeObj:new Date(active.startTs || Date.now()), tlRef:active, type:active.type};
                    if(active.duration.includes(' / ¥')) currentRecord.savedCost=parseInt(active.duration.split(' / ¥')[1]);
                    document.getElementById('active-name').innerText=active.name; document.getElementById('recording-overlay').classList.remove('hidden'); document.getElementById('recording-overlay').classList.add('flex');
                    const la=document.getElementById('live-cost-input-area');
                    if(active.type==='shop'||active.type==='food'){ la.classList.remove('hidden'); la.classList.add('flex'); const btn=document.getElementById('live-cost-save-btn'), inp=document.getElementById('live-item-cost'); if(currentRecord.savedCost){ inp.value=currentRecord.savedCost; inp.disabled=true; btn.innerText='SAVED'; btn.disabled=true; btn.className='flex-1 bg-slate-600 text-slate-400 font-bold py-2 px-2 rounded-xl text-sm uppercase min-w-[70px]'; } else { inp.value=''; inp.disabled=false; btn.innerText='SAVE'; btn.disabled=false; btn.className='flex-1 bg-yellow-500 text-black font-bold py-2 px-2 rounded-xl text-sm uppercase min-w-[70px]'; } }
                    timerId = setInterval(updateActiveTimer, 1000); updateActiveTimer();
                }
            } else { applyModeUI(); updateCostDisplay(); renderTimeline(); }
            fetchSchedules();
            fetchLive(currentPark).then(()=>{}).catch(()=>{});
        };
    </script>
